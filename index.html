<!-- ===================== index-temp.html ===================== -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Photography Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { margin:0; font-family:'Inter',sans-serif; background:#f7f7f7; color:#222; }
header {
position:fixed; width:100%; top:0; display:flex; justify-content:space-between; align-items:center;
padding:20px 40px; background:rgba(255,255,255,0.7); backdrop-filter:blur(10px); z-index:1000;
}
/* Logo */
header > a { flex-shrink: 0; text-decoration:none; color:#333; }
header > a h2 { margin:0; font-size:18px; white-space:nowrap; }
/* Nav */
nav { display:flex; flex-wrap:wrap; align-items:center; justify-content:flex-end; gap:0 18px; min-width:0; }
nav a { text-decoration:none; color:#333; font-size:14px; white-space:nowrap; }
a:visited { color:#333; }
/* Hamburger */
.menu-toggle { display:none; font-size:22px; cursor:pointer; flex-shrink:0; line-height:1; padding:4px; }
@media(max-width:768px){
  .menu-toggle { display:block; }
  nav { display:none; position:absolute; top:70px; right:20px; background:white; padding:15px; border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,0.1); flex-direction:column; gap:0; }
  nav a { margin:10px 0; }
  nav.active { display:flex; }
}
.hero {
height:100vh; background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover no-repeat;
display:flex; align-items:center; justify-content:center; color:white; position:relative;
}
.hero::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.3); }
.hero-content { position:relative; z-index:2; text-align:center; }
.hero h1 { font-size:48px; margin:0 0 12px; }
.hero p { margin:0; font-size:16px; opacity:0.9; }
section { padding:80px 40px; max-width:1200px; margin:auto; }
.section-title { text-transform:uppercase; font-size:14px; color:#777; margin-bottom:20px; }
.gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; }
.gallery img { width:100%; height:350px; object-fit:cover; border-radius:14px; }
.about { display:grid; grid-template-columns:1fr 1fr; gap:40px; }
.about img { width:100%; border-radius:14px; }
footer { text-align:center; padding:40px; color:#888; }
@media(max-width:768px){ .about{grid-template-columns:1fr;} }
</style>
</head>
<body>

<header>
<a href="index.html"><h2>My Photography</h2></a>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<nav id="nav-menu">
<a href="landscape.html">Landscape</a>
<a href="nature.html">Nature</a>
<a href="astro.html">Astro</a>
<a href="#about">About</a>
</nav>
</header>

<section class="hero">
<div class="hero-content">
<h1>Capturing Moments</h1>
<p>Landscape • Nature • Astro</p>
</div>
</section>

<section>
<div class="section-title">Featured Work</div>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
<img src="https://images.unsplash.com/photo-1501706362039-c6e80948bb1e">
<img src="https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3">
</div>
</section>

<section id="about">
<div class="section-title">About Me</div>
<div class="about">
<img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
<div>
<p>I'm a photographer capturing portraits, landscapes, and the night sky.</p>
</div>
</div>
</section>

<footer>© 2026 My Photography</footer>

<script>
function toggleMenu(){
  document.getElementById('nav-menu').classList.toggle('active');
}
</script>
</body>
</html>
